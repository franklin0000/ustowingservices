<style>

<body class="vibrant-mesh min-h-screen flex items-center justify-center p-gutter font-body-md text-on-surface">
<!-- Main Container -->
<main class="w-full max-w-lg glass-panel rounded-xl shadow-2xl overflow-hidden relative">
<!-- Atmospheric background element -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container opacity-20 rounded-full blur-3xl pointer-events-none"></div>
<div class="p-xl relative z-10">
<!-- Header Section -->
<header class="mb-xl text-center md:text-left">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-primary-fixed mb-xs">
                    Quick Question
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant opacity-80">
                    Help us match you with the best jobs.
                </p>
</header>
<!-- Survey Content -->
<div class="space-y-xl">
<!-- Satisfaction Section -->
<section class="space-y-md">
<h2 class="font-label-md text-label-md text-on-surface uppercase tracking-wider">
                        How was your registration experience?
                    </h2>
<div class="flex justify-between items-center bg-surface-container-low/50 p-lg rounded-xl">
<button class="emoji-btn text-4xl grayscale hover:grayscale-0 focus:grayscale-0 focus:scale-125 transition-all outline-none" onclick="selectEmoji(this)" title="Angry">😠</button>
<button class="emoji-btn text-4xl grayscale hover:grayscale-0 focus:grayscale-0 focus:scale-125 transition-all outline-none" onclick="selectEmoji(this)" title="Dissatisfied">🙁</button>
<button class="emoji-btn text-4xl grayscale hover:grayscale-0 focus:grayscale-0 focus:scale-125 transition-all outline-none" onclick="selectEmoji(this)" title="Neutral">😐</button>
<button class="emoji-btn text-4xl grayscale hover:grayscale-0 focus:grayscale-0 focus:scale-125 transition-all outline-none" onclick="selectEmoji(this)" title="Satisfied">🙂</button>
<button class="emoji-btn text-4xl grayscale hover:grayscale-0 focus:grayscale-0 focus:scale-125 transition-all outline-none" onclick="selectEmoji(this)" title="Very Satisfied">😍</button>
</div>
</section>
<!-- Job Preferences Section -->
<section class="space-y-md">
<h2 class="font-label-md text-label-md text-on-surface uppercase tracking-wider">
                        Which types of jobs do you prefer?
                    </h2>
<div class="flex flex-wrap gap-sm">
<button class="px-lg py-sm rounded-full border border-outline text-label-md bg-surface-container-lowest hover:bg-surface-container-high transition-colors" onclick="toggleChip(this)">

<button class="px-lg py-sm rounded-full border border-outline text-label-md bg-surface-container-lowest hover:bg-surface-container-high transition-colors" onclick="toggleChip(this)">

<button class="px-lg py-sm rounded-full border border-outline text-label-md bg-surface-container-lowest hover:bg-surface-container-high transition-colors" onclick="toggleChip(this)">

<button class="px-lg py-sm rounded-full border border-outline text-label-md bg-surface-container-lowest hover:bg-surface-container-high transition-colors" onclick="toggleChip(this)">

</div>

<!-- Interactive Logic -->
<script>
        function selectEmoji(el) {
            const btns = el.parentElement.querySelectorAll('button');
            btns.forEach(btn => {
                btn.classList.add('grayscale');
                btn.classList.remove('scale-125');
            });
            el.classList.remove('grayscale');
            el.classList.add('scale-125');
        }

        function toggleChip(el) {
            el.classList.toggle('chip-active');
            // Micro-interaction
            el.style.transform = 'scale(0.95)';
            setTimeout(() => {
                el.style.transform = 'scale(1)';
            }, 100);
        }

        // Floating particles background effect
        const createParticle = () => {
            const particle = document.createElement('div');
            particle.className = 'fixed rounded-full pointer-events-none opacity-20 bg-white';
            const size = Math.random() * 10 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            document.body.appendChild(particle);

            const animation = particle.animate([
                { transform: 'translate(0, 0)', opacity: 0.2 },
                { transform: `translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px)`, opacity: 0 }
            ], {
                duration: Math.random() * 3000 + 2000,
                easing: 'ease-out'
            });

            animation.onfinish = () => particle.remove();
        };

        setInterval(createParticle, 500);
    </script>
